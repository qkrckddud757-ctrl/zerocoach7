<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>번들 세트 대표이미지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1080px;height:1080px;overflow:hidden;font-family:'Noto Sans KR',sans-serif;word-break:keep-all;}
body{
  position:relative;color:#fff;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,107,58,0.4), transparent 42%),
    radial-gradient(circle at 80% 80%, rgba(91,234,214,0.4), transparent 48%),
    linear-gradient(135deg,#1a0b35 0%,#0a1328 50%,#0f1a3d 100%);
}
body::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,216,94,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,216,94,0.05) 1px, transparent 1px);
  background-size:72px 72px;
  pointer-events:none;
}
body::after{
  content:'';position:absolute;top:-100px;right:-50px;
  width:300px;height:1500px;transform:rotate(20deg);
  background:linear-gradient(180deg, transparent, rgba(91,234,214,0.1) 50%, transparent);
  filter:blur(50px);pointer-events:none;
}
.wrap{
  position:relative;width:100%;height:100%;
  padding:90px 80px 80px;display:flex;flex-direction:column;justify-content:space-between;
}

/* 상단 */
.top-row{display:flex;justify-content:space-between;align-items:center;}
.brand{
  display:flex;align-items:center;gap:14px;
  font-weight:900;letter-spacing:4px;font-size:22px;color:#FFD85E;
}
.brand .dot{width:14px;height:14px;border-radius:50%;background:#FFD85E;box-shadow:0 0 22px #FFD85E;}
.discount-badge{
  background:linear-gradient(135deg,#FF3A3A 0%,#E94B1E 50%,#FF6B3A 100%);
  color:#fff;font-weight:900;font-size:22px;letter-spacing:2px;
  padding:14px 24px;border-radius:50px;
  box-shadow:0 14px 32px rgba(233,75,30,0.6);
  border:2px solid rgba(255,216,94,0.6);
}

/* 메인 타이틀 */
.title-block{margin-top:40px;}
.kicker{
  display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(90deg,#5BEAD6 0%,#FFD85E 100%);color:#0a1328;
  font-weight:900;font-size:24px;letter-spacing:2.5px;
  padding:11px 26px;border-radius:8px;margin-bottom:32px;
  box-shadow:0 12px 28px rgba(91,234,214,0.4);
}
.allinone{
  font-size:78px;font-weight:900;line-height:0.95;letter-spacing:-4px;
  background:linear-gradient(180deg,#FFE889 0%,#FFD85E 50%,#FF8B3A 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  text-shadow:0 0 60px rgba(255,216,94,0.35);
  filter:drop-shadow(0 16px 24px rgba(0,0,0,0.5));
  margin-bottom:14px;
}
.allinone-sub{
  font-size:74px;font-weight:900;line-height:1.05;letter-spacing:-3px;color:#fff;
}
.allinone-sub b{
  background:linear-gradient(90deg,#5BEAD6 0%,#A8FFE8 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
  text-shadow:0 0 24px rgba(91,234,214,0.4);
}

/* 구성품 표시 */
.combo-row{
  display:flex;align-items:center;gap:18px;margin-top:36px;
  padding:24px 28px;border-radius:18px;
  background:rgba(0,0,0,0.45);backdrop-filter:blur(20px);
  border:1px solid rgba(91,234,214,0.3);
}
.combo-item{
  flex:1;text-align:center;
}
.combo-item .ic{font-size:38px;margin-bottom:6px;display:block;}
.combo-item .nm{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.5px;}
.combo-item .sm{font-size:16px;color:#5BEAD6;font-weight:700;margin-top:4px;}
.combo-plus{
  font-size:42px;font-weight:900;color:#FFD85E;
  text-shadow:0 0 16px rgba(255,216,94,0.6);
}

/* 가격 박스 */
.price-row{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg, rgba(255,58,58,0.18) 0%, rgba(0,0,0,0.55) 100%);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,216,94,0.4);border-radius:22px;
  padding:30px 38px;margin-top:24px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,216,94,0.08);
}
.price-left .original{
  font-size:24px;color:#FFD0B8;text-decoration:line-through;font-weight:700;letter-spacing:0.5px;
}
.price-left .now{
  font-size:84px;font-weight:900;letter-spacing:-4px;color:#fff;line-height:1;
  margin-top:4px;display:flex;align-items:baseline;gap:6px;
}
.price-left .now .num{
  background:linear-gradient(180deg,#FFE889 0%,#FFD85E 60%,#FF8B3A 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;
}
.price-left .now .won{font-size:42px;color:#fff;}
.price-right{text-align:right;}
.price-right .save{
  font-size:24px;color:#FFD85E;font-weight:900;letter-spacing:0.5px;
}
.price-right .save b{font-size:36px;color:#fff;}
.price-right .reviews{font-size:22px;color:#AEDDFF;margin-top:8px;font-weight:700;}

/* 하단 라인 */
.bottom-line{
  display:flex;justify-content:center;align-items:center;gap:36px;
  margin-top:18px;font-size:22px;color:#FFD85E;font-weight:900;letter-spacing:1.5px;
}
.bottom-line span{display:flex;align-items:center;gap:10px;}
.bottom-line .pip{width:6px;height:6px;border-radius:50%;background:#5BEAD6;box-shadow:0 0 10px #5BEAD6;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div class="brand"><span class="dot"></span>ZEROCOACH · BUNDLE</div>
    <div class="discount-badge">🔥 78% OFF · 한정 20명</div>
  </div>

  <div class="title-block">
    <span class="kicker">👑 ALL-IN-ONE 풀패키지</span>
    <div class="allinone">ALL · IN · ONE</div>
    <div class="allinone-sub">전자책 <b>+</b> 템플릿<br>완전 통합 세트</div>

    <div class="combo-row">
      <div class="combo-item">
        <span class="ic">📘</span>
        <div class="nm">전자책</div>
        <div class="sm">매출 자동화 비밀문서</div>
      </div>
      <div class="combo-plus">+</div>
      <div class="combo-item">
        <span class="ic">📂</span>
        <div class="nm">템플릿 20+</div>
        <div class="sm">세일즈북·회원관리·PDF</div>
      </div>
    </div>
  </div>

  <div>
    <div class="price-row">
      <div class="price-left">
        <div class="original">정상가 396,000원</div>
        <div class="now"><span class="num">88,000</span><span class="won">원</span></div>
      </div>
      <div class="price-right">
        <div class="save">한 번에 <b>308,000원</b><br>아끼는 선택</div>
      </div>
    </div>
    <div class="bottom-line">
      <span><span class="pip"></span>크몽 4.88점</span>
      <span><span class="pip"></span>219개 리뷰</span>
      <span><span class="pip"></span>434건 거래</span>
    </div>
  </div>
</div>
</body>
</html>
