<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상위 트레이너들의 도구 템플릿 패키지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
.s{width:860px;max-width:100%;margin:0 auto;overflow:hidden;}
img.full{width:100%;display:block;}
.gap{background:#111;padding:80px 64px;text-align:center;}
.gap p{line-height:1.5;}
.spacer{background:#111;height:60px;}
:root{--t1:#e8e8e8;--t2:#999;--acc:#E53935;--gold:#FFD700;--mint:#5BEAD6;}
img.ri{width:100%;border-radius:12px;border:1px solid #222;display:block;margin-bottom:16px;}
@keyframes borderPulse{0%,100%{border-color:rgba(255,120,0,0.2);}50%{border-color:rgba(255,120,0,0.9);}}
@media(max-width:860px){.s{width:100%!important;}.gap{padding:60px 28px!important;}}
@media(max-width:480px){.gap{padding:48px 20px!important;}}
</style>
</head>
<body>

<!-- 히어로 GIF -->
<div class="s"><img class="full" src="img/template_v2/1.gif" alt="옆센터 트레이너는 총들고 싸우는데"></div>

<div class="s spacer"></div>

<!-- 구성 소개 -->
<div class="s"><img class="full" src="img/template_v2/2.gif" alt="세일즈북 소개"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/3.gif" alt="회원관리 소개"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/4.gif" alt="AI프롬프트 소개"></div>

<!-- 여백 + 전환 카피 -->
<div class="s gap">
  <p style="font-size:34px;font-weight:900;color:var(--mint);">이 안에 뭐가 들었길래?</p>
</div>

<!-- 상세 GIF -->
<div class="s"><img class="full" src="img/template_v2/7.gif" alt="상세 내용"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/8.gif" alt="상세 내용"></div>

<!-- 여백 + 증거 전환 -->
<div class="s gap">
  <p style="font-size:34px;font-weight:900;color:var(--t1);">이미 <span style="color:var(--acc);">수백 명</span>이 쓰고 있습니다.</p>
</div>

<!-- 후기 + 실적 -->
<div class="s"><img class="full" src="img/template_v2/11.gif" alt="후기/실적"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/12.gif" alt="가격"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/13.gif" alt="추가 내용"></div>

<!-- 여백 + 긴급성 -->
<div class="s gap">
  <p style="font-size:34px;font-weight:900;color:var(--acc);">선착순 20명 마감 후 정가로 올라갑니다.</p>
  <p style="font-size:22px;color:var(--t2);margin-top:12px;">PT 1회도 안 되는 가격입니다. 미루면 놓칩니다.</p>
</div>

<!-- CTA 깜빡이 GIF (전자책과 동일 구조) -->
<div class="s"><img class="full" src="img/ebook_v2/cta_blink.gif" alt="49,000원 — 지금 바로 구매하기"></div>

</body>
</html>
