<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상위 1% 트레이너의 도구 템플릿 패키지</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;word-break:keep-all;overflow-wrap:break-word;}
body{background:#111;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
.s{width:860px;max-width:100%;margin:0 auto;overflow:hidden;}
img.full{width:100%;display:block;}
.spacer{background:#111;height:60px;}
@media(max-width:860px){.s{width:100%!important;}}

/* ═══ S0: 파랑 인트로 히어로 (HD · 모바일/PC 모두 선명) ═══ */
.intro-hero{position:relative;overflow:hidden;background:#0a1328;}
.intro-hero .bg-img{
  position:relative;z-index:1;width:100%;height:auto;display:block;
  image-rendering:auto;
  image-rendering:-webkit-optimize-contrast;
  -webkit-backface-visibility:hidden;
  -webkit-transform:translate3d(0,0,0);
  transform:translate3d(0,0,0);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}
</style>
</head>
<body>

<!-- ═══ 0. 파랑 인트로 히어로 ═══ -->
<div class="s intro-hero">
  <img class="bg-img" src="img/template_v3/new_template_hero.gif" alt="트레이너 매출 도구 풀세트 - 4.4억 매출 달성">
</div>
<div class="s spacer"></div>

<!-- ═══ 1~12. 상세페이지 본문 ═══ -->
<div class="s"><img class="full" src="img/template_v3/1.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v3/2.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v3/3.gif"></div>
<div class="s spacer"></div>

<div class="s spacer"></div>

<div class="s spacer"></div>

<div class="s"><img class="full" src="img/template_v3/template_extra_01.jpg"></div>
<div class="s spacer"></div>

<div class="s"><img class="full" src="img/template_v3/12.gif"></div>

<!-- ═══ 부모 iframe 자동 높이 조절 ═══ -->
<script>
(function(){
  function sendHeight(){
    try{
      var h = Math.max(document.body.scrollHeight,document.documentElement.scrollHeight,document.body.offsetHeight);
      if(window.parent && window.parent.postMessage){window.parent.postMessage({type:'zc-height',height:h},'*');}
    }catch(e){}
  }
  window.addEventListener('load',function(){setTimeout(sendHeight,300);setTimeout(sendHeight,1500);});
  window.addEventListener('resize',function(){setTimeout(sendHeight,100);});
  document.querySelectorAll('img').forEach(function(img){if(!img.complete){img.addEventListener('load',sendHeight);}});
  setInterval(sendHeight,3000);
})();
</script>

</body>
