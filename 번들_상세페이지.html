<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자책 + 템플릿 올인원 번들 세트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;word-break:keep-all;overflow-wrap:break-word;}
body{background:#111;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
.s{width:860px;max-width:100%;margin:0 auto;overflow:hidden;}
img.full{width:100%;display:block;}
.spacer{background:#111;height:60px;}
.gap{background:#111;padding:80px 64px;text-align:center;}
.gap p{line-height:1.5;}
:root{--t1:#e8e8e8;--t2:#999;--acc:#E53935;--mint:#5BEAD6;--green:#3fb950;--gold:#FFD700;}
@media(max-width:860px){.s{width:100%!important;}.gap{padding:60px 28px!important;}}
@media(max-width:480px){.gap{padding:48px 20px!important;}}

/* ═══ S0: 파랑 인트로 히어로 (고화질 · 효과 최소화) ═══ */
.intro-hero{position:relative;overflow:hidden;background:#0a1328;}
.intro-hero .bg-img{
  position:relative;z-index:1;width:100%;height:auto;display:block;
  image-rendering:-webkit-optimize-contrast;
  image-rendering:crisp-edges;
  -webkit-backface-visibility:hidden;
  transform:translateZ(0);
}

/* ═══ 가격 블록 (할인 강조) ═══ */
.price-block{padding:100px 64px;}
.price-label{font-size:18px;font-weight:700;color:var(--gold);letter-spacing:4px;margin-bottom:18px;}
.price-origin{
  display:inline-block;background:rgba(153,153,153,0.1);border:1px solid #444;
  border-radius:50px;padding:14px 36px;margin-bottom:28px;
}
.price-origin .lbl{font-size:20px;color:var(--t2);margin-right:12px;font-weight:700;}
.price-origin .val{font-size:30px;color:var(--t2);text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:var(--acc);font-weight:700;}
.price-now-wrap{margin-bottom:24px;}
.price-now-wrap .arrow{font-size:42px;color:var(--green);margin-bottom:10px;}
.price-now{font-size:88px;font-weight:900;color:var(--green);line-height:1;letter-spacing:-3px;text-shadow:0 0 30px rgba(63,185,80,0.3);}
.price-now .cur{font-size:54px;margin-left:6px;}
.discount-badge{
  display:inline-block;background:linear-gradient(135deg,var(--acc),#ff6b3a);
  color:#fff;font-size:30px;font-weight:900;letter-spacing:2px;
  padding:16px 40px;border-radius:50px;margin-top:22px;
  box-shadow:0 10px 30px rgba(229,57,53,0.4);
  animation:pulse 2s ease-in-out infinite;
}
.discount-badge em{font-style:normal;font-size:44px;color:#ffd85e;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
.price-sub{font-size:20px;color:var(--t2);margin-top:18px;line-height:1.6;}
.price-sub b{color:var(--t1);}

@media(max-width:480px){
  .price-now{font-size:64px;}
  .price-now .cur{font-size:38px;}
  .discount-badge{font-size:22px;padding:12px 28px;}
  .discount-badge em{font-size:32px;}
}
</style>
</head>
<body>

<!-- ═══ 0. 파랑 인트로 히어로 ═══ -->
<div class="s intro-hero">
  <img class="bg-img" src="img/bundle_v3/new_hero.jpg" alt="번들 세트 - 전자책 + 템플릿 올인원">
</div>
<div class="s spacer"></div>

<!-- 번들 카피 히어로 -->
<div class="s gap" style="padding:90px 64px;">
  <p style="font-size:22px;font-weight:700;color:var(--green);letter-spacing:3px;margin-bottom:16px;">BEST VALUE BUNDLE</p>
  <p style="font-size:46px;font-weight:900;color:var(--t1);line-height:1.3;">시스템도 없고 도구도 없으면<br><span style="color:var(--acc);">뭘로 싸우실 건가요?</span></p>
</div>

<!-- PART 1 — 전자책 -->
<div class="s gap">
  <p style="font-size:18px;font-weight:700;color:var(--mint);letter-spacing:3px;margin-bottom:8px;">PART 1 — THE SYSTEM</p>
  <p style="font-size:34px;font-weight:900;color:var(--t1);">매출을 만드는 시스템</p>
</div>

<div class="s"><img class="full" src="img/ebook_v2/1.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/4.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/9.gif"></div>
<div class="s spacer"></div>
<!-- 추가 5, 추가 6 — 템플릿 소개 직전 -->
<div class="s"><img class="full" src="img/bundle_v3/추가5.jpg"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/bundle_v3/추가6.jpg"></div>

<!-- PART 2 — 템플릿 -->
<div class="s gap">
  <p style="font-size:18px;font-weight:700;color:var(--acc);letter-spacing:3px;margin-bottom:8px;">PART 2 — THE TOOLS</p>
  <p style="font-size:34px;font-weight:900;color:var(--t1);">상담을 바꾸는 도구</p>
</div>

<div class="s"><img class="full" src="img/template_v2/1.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/3.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/4.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/5.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/6.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/7.gif"></div>

<!-- ═══ 가격 · 할인 강조 ═══ -->
<div class="s gap price-block">
  <p class="price-label">★ BUNDLE PROMOTION ★</p>
  <div class="price-origin">
    <span class="lbl">따로 사면 정상가</span>
    <span class="val">396,000원</span>
  </div>
  <div class="price-now-wrap">
    <p class="arrow">▼</p>
    <p class="price-now">88,000<span class="cur">원</span></p>
  </div>
  <div class="discount-badge">
    <em>78%</em> OFF · 무려 308,000원 할인
  </div>
  <p class="price-sub"><b>시스템 + 도구</b>를 한 번에 · 번들 전용 특가</p>
</div>

<!-- ═══ EXTRA: 번들 상품 설명 (9섹션) ═══ -->
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/bundle_v3/bundle_extra_01.jpg"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/bundle_v3/bundle_extra_02.jpg"></div>

<!-- ═══ FINAL CTA (가장 마지막 · 깜빡이 GIF) ═══ -->

</body>
</html>
