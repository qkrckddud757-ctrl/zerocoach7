<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자책 + 템플릿 올인원 번들 세트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
.s{width:860px;max-width:100%;margin:0 auto;overflow:hidden;}
img.full{width:100%;display:block;}
.gap{background:#111;padding:80px 64px;text-align:center;}
.gap p{line-height:1.5;}
.spacer{background:#111;height:60px;}
:root{--t1:#e8e8e8;--t2:#999;--acc:#E53935;--gold:#FFD700;--mint:#5BEAD6;--green:#3fb950;}
img.ri{width:100%;border-radius:12px;border:1px solid #222;display:block;margin-bottom:16px;}
@media(max-width:860px){.s{width:100%!important;}.gap{padding:60px 28px!important;}}
@media(max-width:480px){.gap{padding:48px 20px!important;}}
</style>
</head>
<body>

<!-- 히어로 — 번들 전용 -->
<div class="s gap" style="padding:100px 64px;">
  <p style="font-size:22px;font-weight:700;color:var(--green);letter-spacing:3px;margin-bottom:16px;">BEST VALUE BUNDLE</p>

</div>

</div>

<div class="s"><img class="full" src="img/ebook_v2/제목 추가 (2).gif" alt="전자책 히어로"></div>
<div class="s spacer"></div>

  <p style="font-size:36px;font-weight:900;color:var(--t1);">상담을 바꾸는 <span style="color:var(--acc);">도구</span></p>
</div>

<div class="s"><img class="full" src="img/template_v2/1.gif" alt="템플릿 히어로"></div>

  <p style="font-size:22px;color:var(--t2);margin-top:12px;">얼리버드 종료 후 정가로 올라갑니다.</p>
</div>

<!-- CTA 깜빡이 GIF -->
<div class="s"><img class="full" src="img/ebook_v2/cta_blink.gif" alt="88,000원 — 지금 바로 구매하기"></div>

<div class="s gap" style="padding:40px 64px;">
  <p style="font-size:16px;color:#555;">인스타 문의: @pt_zerocoach7</p>

</html>
