<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자책 + 템플릿 올인원 번들 세트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
.s{width:860px;max-width:100%;margin:0 auto;overflow:hidden;}
img.full{width:100%;display:block;}
.spacer{background:#111;height:60px;}
.gap{background:#111;padding:80px 64px;text-align:center;}
.gap p{line-height:1.5;}
:root{--t1:#e8e8e8;--t2:#999;--acc:#E53935;--mint:#5BEAD6;--gold:#FFD700;--green:#3fb950;}
@media(max-width:860px){.s{width:100%!important;}.gap{padding:60px 28px!important;}}
@media(max-width:480px){.gap{padding:48px 20px!important;}}
</style>
</head>
<body>

<!-- 번들 히어로 -->
<div class="s gap" style="padding:100px 64px;">
  <p style="font-size:22px;font-weight:700;color:var(--green);letter-spacing:3px;margin-bottom:16px;">BEST VALUE BUNDLE</p>
  <p style="font-size:46px;font-weight:900;color:var(--t1);line-height:1.3;">시스템도 없고 도구도 없으면<br><span style="color:var(--acc);">뭘로 싸우실 건가요?</span></p>
</div>

<!-- PART 1 — 전자책 -->
<div class="s gap">
  <p style="font-size:18px;font-weight:700;color:var(--mint);letter-spacing:3px;margin-bottom:8px;">PART 1 — THE SYSTEM</p>
  <p style="font-size:34px;font-weight:900;color:var(--t1);">매출을 만드는 시스템</p>
</div>

<div class="s"><img class="full" src="img/ebook_v2/1.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/2.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/3.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/4.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/5.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/6.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/7.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/8.gif"></div>

<!-- PART 2 — 템플릿 -->
<div class="s gap">
  <p style="font-size:18px;font-weight:700;color:var(--acc);letter-spacing:3px;margin-bottom:8px;">PART 2 — THE TOOLS</p>
  <p style="font-size:34px;font-weight:900;color:var(--t1);">상담을 바꾸는 도구</p>
</div>

<div class="s"><img class="full" src="img/template_v2/1.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/2.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/3.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/4.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/5.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/6.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/7.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/8.gif"></div>

<!-- 후기 -->
<div class="s gap">
  <p style="font-size:34px;font-weight:900;color:var(--t1);">이미 <span style="color:var(--acc);">수백 명</span>이 증명했습니다.</p>
</div>

<div class="s"><img class="full" src="img/ebook_v2/10.gif"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/template_v2/9.gif"></div>

<!-- 가격 -->
<div class="s gap" style="padding:100px 64px;">
  <p style="font-size:28px;color:var(--t2);margin-bottom:12px;">따로 사면 98,000원</p>
  <p style="font-size:56px;font-weight:900;color:var(--green);margin-bottom:8px;">세트 88,000원</p>
  <p style="font-size:22px;color:var(--t2);text-decoration:line-through;">정가 396,000원</p>
  <p style="font-size:24px;font-weight:700;color:var(--green);margin-top:12px;">78% 할인 · 시스템 + 도구 한번에</p>
</div>

<!-- 긴급성 -->
<div class="s gap">
  <p style="font-size:34px;font-weight:900;color:var(--acc);">이 가격은 오래 유지되지 않습니다.</p>
  <p style="font-size:22px;color:var(--t2);margin-top:12px;">얼리버드 종료 후 정가로 올라갑니다.</p>
</div>

</body>
</html>
