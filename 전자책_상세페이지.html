*{margin:0;padding:0;box-sizing:border-box;word-break:keep-all;overflow-wrap:break-word;}
html,body{background:transparent !important;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;margin:0;padding:0;}

/* ═══ S0: 파랑 인트로 히어로 (HTML 네이티브 · 선명도 최대) ═══ */
.intro-hero-html{
  width:860px;max-width:100%;margin:0 auto;position:relative;overflow:hidden;
  padding:8% 7% 7%;color:#fff;box-sizing:border-box;
  background:linear-gradient(180deg,#0b1028 0%,#110a35 30%,#0d1a48 70%,#070f2e 100%);
}
.intro-hero-html .ih-tag{display:inline-block;background:#5CDAFF;color:#0a1328;font-size:2.1vw;font-weight:900;padding:1.2% 3%;border-radius:40px;letter-spacing:3px;margin-bottom:4%;}
.intro-hero-html .ih-pre{font-size:2.8vw;font-weight:700;color:#AEDDFF;text-align:center;margin-bottom:2%;}
.intro-hero-html .ih-pre b{color:#5CDAFF;font-weight:900;}
.intro-hero-html .ih-num{text-align:center;margin:2% 0;animation:hhPulse 0.4s ease-in-out infinite;}
.intro-hero-html .ih-num .big{font-size:23vw;font-weight:900;color:#5CDAFF;line-height:0.95;letter-spacing:-0.6vw;animation:hhBlink 0.4s steps(2) infinite;}
.intro-hero-html .ih-num .unit{font-size:10vw;font-weight:900;color:#fff;animation:hhBlink 0.4s steps(2) infinite;}
.intro-hero-html .ih-num .ex{font-size:14vw;font-weight:900;color:#FFD85E;display:inline-block;animation:hhBounce 0.3s ease-in-out infinite, hhFlash 0.4s steps(2) infinite;}
.intro-hero-html .ih-sub{font-size:3.7vw;font-weight:900;color:#AEDDFF;text-align:center;margin:1% 0 5%;letter-spacing:2px;}
.intro-hero-html .ih-title{font-size:6.7vw;font-weight:900;color:#fff;text-align:center;line-height:1.2;letter-spacing:-0.25vw;margin-bottom:6%;}
.intro-hero-html .ih-title b{color:#5CDAFF;}
.intro-hero-html .ih-book{text-align:center;margin:5% auto;}
.intro-hero-html .ih-book img{width:80%;max-width:620px;display:block;margin:0 auto;border-radius:14px;box-shadow:0 18px 48px rgba(0,0,0,0.6);}
.intro-hero-html .ih-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:1.5%;margin:4% 0;}
.intro-hero-html .ih-chip{background:rgba(92,218,255,0.15);border:1.5px solid rgba(92,218,255,0.4);border-radius:40px;padding:1.2% 2.4%;font-size:1.75vw;font-weight:700;color:#5CDAFF;}
.intro-hero-html .ih-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1.4%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(174,221,255,0.3);border-radius:16px;padding:2.8% 2%;margin-top:4%;}
.intro-hero-html .ih-stats .stat{text-align:center;}
.intro-hero-html .ih-stats .n{font-size:3.3vw;font-weight:900;color:#5CDAFF;line-height:1;}
.intro-hero-html .ih-stats .l{font-size:1.4vw;color:#8a9ec0;font-weight:700;margin-top:6%;}
.intro-hero-html .ih-brand{margin-top:4%;text-align:center;font-size:4.9vw;font-weight:900;letter-spacing:4px;color:#5CDAFF;}
.intro-hero-html .ih-brand-sub{text-align:center;font-size:1.6vw;color:#AEDDFF;margin-top:0.5%;letter-spacing:2px;font-weight:700;}
@keyframes hhPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
@keyframes hhBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-2vw);}}
@keyframes hhBlink{0%{color:#5CDAFF;}50%{color:#FFFFFF;}}
@keyframes hhFlash{0%{color:#FFD85E;}50%{color:#FF6B3A;}}
@media(min-width:860px){
  .intro-hero-html .ih-tag{font-size:18px;}
  .intro-hero-html .ih-pre{font-size:24px;}
  .intro-hero-html .ih-num .big{font-size:200px;letter-spacing:-6px;}
  .intro-hero-html .ih-num .unit{font-size:90px;}
  .intro-hero-html .ih-num .ex{font-size:120px;}
  .intro-hero-html .ih-sub{font-size:32px;}
  .intro-hero-html .ih-title{font-size:58px;letter-spacing:-2px;}

  .intro-hero-html .ih-stats .l{font-size:12px;}
  .intro-hero-html .ih-brand{font-size:42px;}
  .intro-hero-html .ih-brand-sub{font-size:14px;}
  @keyframes hhBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
}
</style>

<!-- ═══ 부모 iframe 자동 높이 조절 ═══ -->
<script>
(function(){
  function sendHeight(){
    try{
      var h = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight,
        document.body.offsetHeight
      );
      if(window.parent && window.parent.postMessage){
        window.parent.postMessage({type:'zc-height',height:h},'*');
      }
    }catch(e){}
  }
  window.addEventListener('load',function(){setTimeout(sendHeight,300);setTimeout(sendHeight,1500);});
  window.addEventListener('resize',function(){setTimeout(sendHeight,100);});
  document.querySelectorAll('img').forEach(function(img){
    if(!img.complete){img.addEventListener('load',sendHeight);}
  });
  setInterval(sendHeight,3000);
})();
</script>
