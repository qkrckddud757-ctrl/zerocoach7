<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트레이너 매출 자동화 시스템</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;font-family:'Noto Sans KR',sans-serif;overflow-x:hidden;}
.s{width:860px;max-width:100%;margin:0 auto;overflow:hidden;}
img.full{width:100%;display:block;}

/* 여백 섹션 */
.gap{background:#111;padding:80px 64px;text-align:center;}
.spacer{background:#111;height:60px;}
.gap p{line-height:1.5;}

/* 색상 */
:root{--t1:#e8e8e8;--t2:#999;--acc:#E53935;--gold:#FFD700;--mint:#5BEAD6;}

/* 후기 이미지 */
img.ri{width:100%;border-radius:12px;border:1px solid #222;display:block;margin-bottom:16px;}

/* 깜빡이 효과 (CTA용) */
@keyframes borderPulse{0%,100%{border-color:rgba(255,120,0,0.2);}50%{border-color:rgba(255,120,0,0.9);}}

/* 반응형 */
@media(max-width:860px){.s{width:100%!important;}.gap{padding:36px 28px!important;}}
@media(max-width:480px){.gap{padding:28px 20px!important;}}
</style>
</head>
<body>

<!-- 히어로 GIF -->
<div class="s"><img class="full" src="img/ebook_v2/제목 추가 (2).gif" alt="억대 연봉 트레이너들의 시스템"></div>

<div class="s spacer"></div>

<!-- 스토리 GIF -->
<div class="s"><img class="full" src="img/story_6.gif" alt="불안해서 배우러 다녔습니다"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/story_7.gif" alt="되더군요 매출이 쉬워지는게"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/story_8.gif" alt="500명이 넘게 효과를 보고 있어요"></div>

<!-- 여백 + 전환 카피 -->
<div class="s gap">
  <p style="font-size:36px;font-weight:900;color:var(--mint);">그 시스템, 도대체 뭔데?</p>
</div>

<!-- 수정본 GIF 순서대로 -->
<div class="s"><img class="full" src="img/ebook_v2/6.gif" alt="커리큘럼"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/7.gif" alt="상세 내용"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/8.gif" alt="상세 내용"></div>

<!-- 여백 + 증거 전환 -->
<div class="s gap">
  <p style="font-size:36px;font-weight:900;color:var(--t1);">진짜냐구요? <span style="color:var(--acc);">숫자</span>로 증명합니다.</p>
</div>

<div class="s"><img class="full" src="img/ebook_v2/9.gif" alt="후기/실적"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/9.jpg" alt="후기 상세"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/10.gif" alt="가격/혜택"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/11.gif" alt="추가 혜택"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/12.gif" alt="마무리"></div>
<div class="s spacer"></div>
<div class="s"><img class="full" src="img/ebook_v2/13.gif" alt="추가 내용"></div>

<!-- 여백 + 긴급성 -->
<div class="s gap">
  <p style="font-size:34px;font-weight:900;color:var(--acc);">얼리버드는 곧 종료됩니다.</p>
  <p style="font-size:22px;color:var(--t2);margin-top:12px;">지금 이 가격에 살 수 있는 마지막 기회입니다.</p>
</div>

<!-- CTA 깜빡이 GIF -->
<div class="s"><img class="full" src="img/ebook_v2/cta_blink.gif" alt="49,000원 — 지금 바로 구매하기"></div>

</body>
</html>
